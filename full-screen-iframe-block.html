<iframe style="width: 100%; height: 300px; border: 0;" allowfullscreen="" allow="geolocation" src="//umap.openstreetmap.fr/en/map/metromapsorg_1203972?scaleControl=false&amp;miniMap=false&amp;scrollWheelZoom=false&amp;zoomControl=true&amp;editMode=disabled&amp;moreControl=true&amp;searchControl=null&amp;tilelayersControl=null&amp;embedControl=null&amp;datalayersControl=true&amp;onLoadPanel=none&amp;captionBar=false&amp;captionMenus=true"></iframe><p><a href="//umap.openstreetmap.fr/en/map/yacht-cruiser-atlas_1102567?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true">See full screen</a></p>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const iframe = document.querySelector('iframe[src*="umap"]');
    if (!iframe) return;

    iframe.onload = function () {
        try {
            const mapWindow = iframe.contentWindow;
            const L = mapWindow.L;

            if (!L) return;

            // Force high-res tiles and disable mobile downscaling
            L.Browser.retina = true;

            // Reduce tile reloads when panning/zooming
            L.Map.mergeOptions({
                fadeAnimation: false,
                zoomAnimation: false,
                markerZoomAnimation: false
            });

            // Make tile layers keep more tiles in memory
            L.TileLayer.prototype.options.updateWhenIdle = true;
            L.TileLayer.prototype.options.keepBuffer = 6;
        } catch (err) {
            console.warn("Could not access uMap iframe:", err);
        }
    };
});
</script>
